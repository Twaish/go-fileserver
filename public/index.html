<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoDrop - Multi Stream</title>
  <link rel="stylesheet" href="/public/styles.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Stream Files to Server</h2>
      <p class="subtitle">Select multiple files to stream them in parallel.</p>
      
      <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <span id="dropZoneText">Click or Drag Files Here</span>
        <input type="file" id="fileInput" multiple>
      </div>
      
      <div id="uploadQueue" class="upload-queue"></div>

      <button class="btn" onclick="uploadFiles()">Stream Files</button>
    </div>

    <div class="card">
      <h2>Available Downloads</h2>
      <p class="subtitle">Files placed on the server side available for download.</p>
      <div class="refresh-box">
        <button class="btn-secondary" onclick="loadSharedFiles()">🔄 Refresh List</button>
      </div>
      <ul id="fileList" class="file-list">
        </ul>
    </div>
  </div>

  <script src="/public/script.js"></script>
</body>
</html>
