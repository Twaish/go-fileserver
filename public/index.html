<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/public/styles.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Stream File to Server</h2>
      <p class="subtitle">Files are saved instantly to the server's upload folder.</p>
      
      <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        <span id="dropZoneText">Click or Drag File Here</span>
        <input type="file" id="fileInput">
      </div>
      
      <div class="progress-wrapper" id="progressWrapper">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div id="status">Streaming... 0%</div>
      </div>

      <button class="btn" onclick="uploadFile()">Stream File</button>
    </div>

    <div class="card">
      <h2>Available Downloads</h2>
      <p class="subtitle">Files placed on the server side available for download.</p>
      <div class="refresh-box">
        <button class="btn-secondary" onclick="loadSharedFiles()">🔄 Refresh List</button>
      </div>
      <ul id="fileList" class="file-list">
        </ul>
    </div>
  </div>

  <script src="/public/script.js"></script>
</body>
</html>
